<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#26215C;--navy2:#1a1740;--navy3:#12102e;
  --purple:#7F77DD;--purple-l:#EEEDFE;--purple-m:#534AB7;
  --teal:#1D9E75;--teal-l:#E1F5EE;
  --coral:#D85A30;--coral-l:#FAECE7;
  --amber:#EF9F27;--amber-l:#FAEEDA;
  --pink:#D4537E;--pink-l:#FBEAF0;
  --blue-l:#E6F1FB;
  --red:#E24B4A;--red-l:#FCEBEB;
  --ink:#1a1918;--ink2:#3d3c38;--ink3:#7a7870;
  --paper:#F7F5EF;--paper2:#EDEBE3;
  --white:#fff;
  --pos-hos:#7F77DD;--pos-leg:#1D9E75;--pos-opp:#378ADD;
  --pos-wbr:#D85A30;--pos-wc:#D4537E;
}
body{background:var(--navy3);color:#f0ede8;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.serif{font-family:Georgia,serif}
.mono{font-family:'Courier New',monospace}

/* buttons */
.btn{border:none;cursor:pointer;font-family:'Courier New',monospace;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:6px;transition:all .15s;font-size:11px}
.btn-primary{background:var(--purple);color:#fff;padding:12px 22px}
.btn-primary:hover{background:var(--purple-m)}
.btn-ghost{background:#1e1e30;border:1px solid #2a2a45;color:#888;padding:10px 16px}
.btn-ghost:hover{background:#26263a;color:#bbb}
.btn-ghost.active{background:var(--purple-m);border-color:var(--purple);color:#fff}
.btn-sm{padding:5px 10px;font-size:10px}
.btn-danger{background:#7f1d1d;color:#fca5a5;padding:12px 22px}
.btn-danger:hover{background:#991b1b}

/* inputs */
.input{background:#0d0d20;border:1px solid #2a2a45;border-radius:6px;padding:10px 14px;color:#f0ede8;font-size:14px;font-family:inherit;width:100%;transition:border-color .15s;outline:none}
.input:focus{border-color:var(--purple)}

/* cards */
.card{background:#111125;border:1px solid #1e1e35;border-radius:10px;padding:16px}

/* badges */
.badge{display:inline-block;font-size:9px;font-family:'Courier New',monospace;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.5px}

/* figure cards */
.fig-card{background:#111125;border:1px solid #1e1e35;border-radius:8px;padding:10px;cursor:pointer;transition:all .12s;width:100%;text-align:left}
.fig-card:hover:not(:disabled){border-color:var(--purple);background:#18182a}
.fig-card:disabled{opacity:.18;cursor:not-allowed}
.fig-card.wc-card:not(:disabled){border-color:rgba(212,83,126,.35)}
.fig-card.wc-card:hover:not(:disabled){border-color:var(--pink)}

/* layout */
.phase-bar{background:#0d0d20;border-bottom:1px solid #1e1e35;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:10}
.pass-bar{background:#160c28;border-bottom:1px solid var(--purple-m);padding:8px 20px;text-align:center;font-family:'Courier New',monospace;font-size:11px;color:#AFA9EC;letter-spacing:1px;font-weight:700}
.sep{height:1px;background:#1e1e35;flex:1}
.score-pill{font-family:'Courier New',monospace;font-size:18px;font-weight:700}
.grid-figs{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:7px}
.layout-2col{display:flex;gap:14px;flex-wrap:wrap}
.sidebar{width:195px;flex-shrink:0}
.main-col{flex:1 1 380px}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.cap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;max-width:760px;margin:0 auto 24px}
.week-layout{display:flex;gap:14px;flex-wrap:wrap;padding:16px 20px;max-width:1020px;margin:0 auto}
.scoreboard{width:200px;flex-shrink:0}
.sb-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:6px;margin-bottom:6px;background:#111125;border:1px solid #1e1e35;font-size:12px}
.sb-row.lead{border-color:var(--purple);background:#160c28}

/* events */
.event-item{border:1px solid #1e1e35;border-radius:8px;padding:14px;margin-bottom:8px;background:#111125}
.event-item.penalty{border-color:#7f1d1d;background:#120808}
.score-flash{font-size:10px;font-family:'Courier New',monospace;margin-top:6px;line-height:2}
.day-sep{display:flex;align-items:center;gap:10px;margin:18px 0 10px}
.day-label{font-family:'Courier New',monospace;font-size:9px;font-weight:700;color:var(--purple);letter-spacing:3px}

/* debrief */
.debrief{border-left:2px solid var(--purple);padding:8px 14px;margin-bottom:12px;font-size:12px;line-height:1.9;color:#666}

/* hint */
.hint-box{background:#0d0d20;border:1px solid #1e1e35;border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:11px;line-height:1.9;font-family:'Courier New',monospace;color:#555}

.podium-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:8px;border:1px solid #1e1e35;background:#111125;margin-bottom:8px}

.t1{background:#FAEEDA;color:#854F0B}
.t2{background:#FAECE7;color:#993C1D}
.t3{background:#FCEBEB;color:#A32D2D}

/* sq slot */

.sq-pick{font-size:10px;margin-bottom:3px;display:flex;align-items:center;gap:4px}

/* ticker */
.ticker{background:var(--navy3);border-top:1px solid #1e1e35;padding:6px 20px;display:flex;gap:20px;overflow:hidden;flex-wrap:nowrap}
.tick{font-size:11px;color:var(--purple);display:flex;gap:5px;align-items:center;white-space:nowrap;font-family:'Courier New',monospace}
</style>

// ─── HELPERS ───────────────────────────────────────────────────
const figById = id => FIGURES.find(f => f.id === id);

function snakeOrder(n, rounds){
  const o = [];
  for(let r = 0; r < rounds; r++){
    const row = Array.from({length:n},(_,i)=>i);
    o.push(...(r%2===1 ? [...row].reverse() : row));
  }
  return o;
}

function calcScores(){
  const scores = S.squads.slice(0,S.numP).map(()=>({total:0, byFig:{}, events:[]}));
  if(S.revDay < 0) return scores;
  ["Monday","Tuesday","Wednesday","Thursday","Friday"].slice(0,S.revDay+1).forEach(day=>{
    (WEEK_EVENTS[day]||[]).forEach(ev=>{
      ev.scoring.forEach(({fid,raw,label})=>{
        const fig = figById(fid);
        S.squads.slice(0,S.numP).forEach((sq,pi)=>{
          if(!sq.includes(fid)) return;
          let pts = raw;
          if(fig && fig.pos==="Wildcard") pts = Math.round(pts * 1.5 * 10)/10;
          if(S.captains[pi]===fid) pts = Math.round(pts * 2 * 10)/10;
          scores[pi].byFig[fid] = Math.round(((scores[pi].byFig[fid]||0)+pts)*10)/10;
          scores[pi].total = Math.round((scores[pi].total+pts)*10)/10;
        });
      });
    });
  });
  return scores;
}

function leaderboard(){
  const sc = calcScores();
  return S.names.slice(0,S.numP)
    .map((name,i)=>({name, score:sc[i].total, byFig:sc[i].byFig, idx:i}))
    .sort((a,b)=>b.score-a.score);
}

function ptsColor(pts){

function ptsStr(pts){ return (pts>0?'+':'')+pts; }

        {c:'var(--pink-l)',tc:'#72243E',label:'Wildcard 1.5×'},
      ].map(p=>`<span style="font-size:11px;font-weight:600;padding:4px 12px;border-radius:99px;background:${p.c};color:${p.tc}">${p.label}</span>`).join('')}
    </div>
  </div>`;
}

// ── DRAFT ──
function renderDraft(){
  const picked = new Set(S.squads.flat());
  const curP = S.draftOrder[S.pickIdx];
  const pName = S.names[curP]||`Player ${curP+1}`;
  const round = Math.floor(S.pickIdx/S.numP)+1;
  const filt = S.posFilter;
  const visibleFigs = filt==="All" ? FIGURES : FIGURES.filter(f=>f.pos===filt);

  return `
  <div style="min-height:100vh">
    <div class="phase-bar">
      <div>
        <div class="mono" style="font-size:9px;color:#555;letter-spacing:2px">SNAKE DRAFT — ROUND ${round} OF ${SQUAD_SIZE}</div>
        <div class="serif" style="font-size:22px">${pName}'s pick</div>
      </div>
      <div style="text-align:right">
        <div class="mono" style="font-size:9px;color:#555;letter-spacing:1px">PICK</div>
        <div class="serif" style="font-size:22px">${S.pickIdx+1} / ${S.draftOrder.length}</div>
      </div>
    </div>
    <div class="pass-bar">📲 PASS THE DEVICE TO ${pName.toUpperCase()}</div>

    <div class="layout-2col" style="padding:14px 16px;max-width:1100px;margin:0 auto">
      <div class="main-col">
        <div class="hint-box">
          <b>Squad target (11 picks):</b> HoS ×2 · LEG ×2 · OPP ×2 · WBR ×1 · WLD ×2 · Flex ×2 &nbsp;|&nbsp;
          <b>Wildcards</b> score 1.5× &nbsp;|&nbsp; <b>Captain</b> (chosen next) scores 2×
        </div>
        <div class="filter-row">
          ${["All",...Object.keys(POS_CONFIG)].map(p=>{
            const lbl = p==="All" ? "ALL" : POS_CONFIG[p].badge;
            return `<button class="btn btn-ghost btn-sm ${S.posFilter===p?'active':''}" data-filt="${p}">${lbl}</button>`;
          }).join('')}
        </div>
        <div class="grid-figs">
          ${visibleFigs.map(fig=>{
            const taken = picked.has(fig.id);
            const cfg = POS_CONFIG[fig.pos];
            const wc = fig.pos==="Wildcard";
            const volColor = VOL_COLOR[fig.vol]||'#666';
            return `<button class="fig-card ${wc?'wc-card':''}" ${taken?'disabled':''} data-pickfig="${fig.id}">
              <div style="font-size:20px;margin-bottom:5px">${fig.flag}</div>
              <div style="font-weight:600;font-size:12px;line-height:1.3;margin-bottom:6px;color:${taken?'#333':'#f0ede8'}">${fig.name}</div>
              <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:4px">
                <span class="badge" style="background:${cfg.color}">${cfg.badge}</span>
                <span class="mono" style="font-size:9px;color:${volColor}">${fig.vol}</span>
              </div>
              ${!taken?`<div style="font-size:10px;color:#444;line-height:1.4;margin-top:4px">${fig.note}</div>`:''}
              ${wc&&!taken?`<div class="mono" style="font-size:9px;color:var(--pink);margin-top:5px;font-weight:700">★ 1.5× pts</div>`:''}
            </button>`;
          }).join('')}
        </div>
      </div>

      <div class="sidebar">
        ${S.names.slice(0,S.numP).map((name,pi)=>{
          const isCur = pi===curP;
          const sq = S.squads[pi]||[];
          return `<div class="card" style="margin-bottom:8px;${isCur?'border-color:var(--purple);background:#140c28':''}">
            <div style="font-weight:700;font-size:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
              <span style="color:${isCur?'#AFA9EC':'#f0ede8'}">${isCur?'▶ ':''}${name||`P${pi+1}`}</span>
              <span class="mono" style="color:#555;font-size:10px">${sq.length}/${SQUAD_SIZE}</span>
            </div>
            ${sq.map(fid=>{
              const f=figById(fid); const cfg=f?POS_CONFIG[f.pos]:null;
              return f?`<div class="sq-pick">
                <span style="font-size:14px">${f.flag}</span>
                <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#ccc;font-size:10px">${f.name}</span>
                <span class="badge" style="background:${cfg?cfg.color:'#333'}">${cfg?cfg.badge:'?'}</span>
              </div>`:'';
            }).join('')}
            ${Array(Math.max(0,SQUAD_SIZE-sq.length)).fill(0).map(()=>`<div class="sq-slot">— empty</div>`).join('')}
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

// ── CAPTAIN ──
function renderCaptain(){
  const pi = S.capStep;
  const pName = S.names[pi]||`Player ${pi+1}`;
  const sq = S.squads[pi]||[];
  return `
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 20px">
    <div class="mono" style="font-size:9px;letter-spacing:4px;color:var(--purple);margin-bottom:8px">CAPTAIN SELECTION</div>
    <div class="serif" style="font-size:42px;margin-bottom:10px;text-align:center">Pick your captain</div>
    <div class="mono" style="color:#555;font-size:11px;text-align:center;max-width:420px;line-height:2.2;margin-bottom:16px">
      Your captain scores <span style="color:#f0ede8;font-weight:700">2×</span> on every event — good and bad — all week.
      A Wildcard captain is <span style="color:var(--pink);font-weight:700">3×</span> (1.5 × 2).
      Locked Monday. No swaps.
    </div>
    <div class="pass-bar" style="border-radius:6px;margin-bottom:32px;padding:8px 28px;border:1px solid var(--purple-m)">
      📲 ${pName.toUpperCase()} — picking ${pi+1} of ${S.numP}
    </div>
    <div class="cap-grid">
      ${sq.map(fid=>{
        const fig=figById(fid); if(!fig) return'';
        const cfg=POS_CONFIG[fig.pos];
        const wc = fig.pos==="Wildcard";
        const mult = wc ? '3×' : '2×';
        const multColor = wc ? 'var(--pink)' : '#EF9F27';
        return `<button class="fig-card ${wc?'wc-card':''}" data-setcap="${fid}" style="padding:18px;text-align:center">
          <div style="font-size:36px;margin-bottom:10px">${fig.flag}</div>
          <div style="font-weight:700;font-size:13px;margin-bottom:8px">${fig.name}</div>
          <span class="badge" style="background:${cfg.color}">${cfg.badge}</span>
          <div class="mono" style="font-size:10px;color:${volColor(fig.vol)};margin-top:6px">${fig.vol} volatility</div>
          <div class="mono" style="font-size:11px;color:${multColor};margin-top:10px;font-weight:700">
            ★ Captain = ${mult} pts
          </div>
          <div style="font-size:10px;color:#444;margin-top:6px;line-height:1.5">${fig.note}</div>
        </button>`;
      }).join('')}
    </div>
  </div>`;
}

function volColor(v){ return VOL_COLOR[v]||'#666'; }

// ── WEEK ──
function renderWeek(){
  const sc = calcScores();
  const board = leaderboard();
  const revDay = S.revDay;
  const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday"];

  let feedHtml = '';
  if(revDay < 0){
    feedHtml = `<div class="card" style="padding:48px;text-align:center;color:#2a2a45;border-color:#1e1e35">
      <div style="font-size:48px;margin-bottom:16px">📅</div>
      <div class="mono" style="font-size:12px;line-height:2.2;letter-spacing:.5px;color:#2a2a45">
        THE SWEEP BEGINS MONDAY<br>HIT REVEAL TO FIRE EACH DAY'S EVENTS
      </div>
    </div>`;
  } else {
    DAYS.slice(0,revDay+1).forEach(day=>{
      feedHtml += `<div class="day-sep">
        <div class="day-label">${day.toUpperCase()}</div>
        <div class="sep"></div>
      </div>`;
      (WEEK_EVENTS[day]||[]).forEach(ev=>{
        let scorerLines = '';
        let anyScored = false;
        ev.scoring.forEach(({fid,raw,label})=>{
          const fig=figById(fid);
          S.squads.slice(0,S.numP).forEach((sq,pi)=>{
            if(!sq.includes(fid)) return;
            anyScored = true;
            let pts = raw;
            const isWc = fig&&fig.pos==="Wildcard";
            const isCap = S.captains[pi]===fid;
            if(isWc) pts = Math.round(pts*1.5*10)/10;
            if(isCap) pts = Math.round(pts*2*10)/10;
            const marks = [isWc?'WLD 1.5×':'', isCap?'CAP 2×':''].filter(Boolean).join(' + ');
            scorerLines += `<div class="score-flash" style="color:${ptsColor(pts)}">
              ${ptsStr(pts)} → <span style="color:#f0ede8;font-weight:700">${S.names[pi]||`P${pi+1}`}</span>
              ${marks?`<span style="color:#888"> · ${marks}</span>`:''}
              <span style="color:#444"> · ${fig?fig.name:'?'} · ${label}</span>
            </div>`;
          });
        });

        feedHtml += `<div class="event-item ${ev.penalty?'penalty':''}">
          ${ev.penalty?`<span class="badge t2" style="margin-bottom:6px;display:inline-block">BAD NEWS</span>`:''}
          <div style="font-weight:600;font-size:13px;margin-bottom:4px;color:${ev.penalty?'#fca5a5':'#f0ede8'}">${ev.headline}</div>
          <div style="font-size:11px;color:#555;margin-bottom:${anyScored?8:0}px;line-height:1.7">${ev.detail}</div>
          ${scorerLines}
          ${!anyScored?`<div class="mono" style="font-size:10px;color:#2a2a45;margin-top:4px">No rostered figures scored this event</div>`:''}
        </div>`;
      });
    });
  }

  const nextDay = revDay < 4 ? ["Monday","Tuesday","Wednesday","Thursday","Friday"][revDay+1] : null;
  const allRevealed = revDay >= 4;

  return `
  <div style="min-height:100vh">
    <div class="phase-bar" style="flex-wrap:wrap;gap:8px">
      <div>
        <div class="mono" style="font-size:9px;color:#555;letter-spacing:2px">WEEK 1 SWEEP · USA</div>
        <div class="serif" style="font-size:20px">${revDay>=0?["Monday","Tuesday","Wednesday","Thursday","Friday"][revDay]+' events':'Sweep not started'}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        ${!allRevealed?`<button class="btn btn-primary" id="revealBtn">
          ${revDay<0?'Reveal Monday →':'Reveal '+nextDay+' →'}
        </button>`:''}
        ${allRevealed?`<button class="btn btn-primary" id="toResults">See Final Results →</button>`:''}
      </div>
    </div>

    <div class="week-layout">
      <div style="flex:1 1 420px">${feedHtml}</div>

      <div class="scoreboard">
        <div class="mono" style="font-size:9px;letter-spacing:2px;color:#555;margin-bottom:10px">LEADERBOARD</div>
        ${board.map((row,rank)=>{
          const isLead = rank===0 && row.score > 0;
          const figEntries = Object.entries(sc[row.idx].byFig);
          return `<div class="sb-row ${isLead?'lead':''}">
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:12px;margin-bottom:3px">
                ${rank===0&&row.score>0?'🏆 ':''}${row.name||`P${row.idx+1}`}
              </div>
              <div style="font-size:9px;font-family:'Courier New',monospace;color:#555;line-height:1.8">
                ${figEntries.map(([fid,pts])=>{
                  const f=figById(+fid);
                  const isCap = S.captains[row.idx]===+fid;
                  return f?`${f.flag} ${ptsStr(pts)}${isCap?' ★':''}`:'';
                }).filter(Boolean).join(' · ')}
              </div>
            </div>
            <div class="score-pill" style="font-size:20px;color:${ptsColor(row.score)};margin-left:8px;flex-shrink:0">${ptsStr(row.score)}</div>
          </div>`;
        }).join('')}
        ${revDay<0?`<div class="mono" style="font-size:10px;color:#2a2a45;text-align:center;margin-top:16px;line-height:2">Scores appear<br>as events fire</div>`:''}

        <div style="margin-top:16px;padding-top:14px;border-top:1px solid #1e1e35">
          <div class="mono" style="font-size:9px;color:#2a2a45;letter-spacing:1px;margin-bottom:8px">CAPTAIN PICKS</div>
          ${S.names.slice(0,S.numP).map((name,pi)=>{
            const f = figById(S.captains[pi]);
            return `<div style="font-size:11px;margin-bottom:5px;color:#555">
              <span style="color:#888">${name||`P${pi+1}`}</span>
              ${f?` · ${f.flag} ${f.name}`:' · none'}
              ${f&&f.pos==="Wildcard"?`<span class="mono" style="color:var(--pink);font-size:9px"> 3×</span>`:`<span class="mono" style="color:#EF9F27;font-size:9px"> 2×</span>`}
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

// ── RESULTS ──
function renderResults(){
  const sc = calcScores();
  const board = leaderboard();
  const winner = board[0];
  const medals = ['🥇','🥈','🥉','🏅','🏅'];
  return `
  <div style="min-height:100vh;padding:48px 20px;max-width:760px;margin:0 auto">
    <div class="mono" style="font-size:9px;letter-spacing:4px;color:var(--purple);text-align:center;margin-bottom:8px">WEEK 1 · FINAL STANDINGS</div>
    <div class="serif" style="font-size:48px;text-align:center;margin-bottom:36px;line-height:1">The Sweep</div>

    <div style="background:#0d0c20;border:1px solid var(--purple-m);border-radius:14px;padding:32px;text-align:center;margin-bottom:28px">
      <div style="font-size:52px;margin-bottom:10px">🏆</div>
      <div class="mono" style="font-size:11px;color:var(--purple);letter-spacing:4px;margin-bottom:10px">SWEEP WINNER</div>
      <div class="serif" style="font-size:44px;margin-bottom:6px">${winner.name||'Player 1'}</div>
      <div class="serif" style="font-size:36px;color:#5DCAA5">${ptsStr(winner.score)} pts</div>
      <div style="margin-top:14px;font-size:12px;color:#555">
        Captain: ${(()=>{const f=figById(S.captains[winner.idx]);return f?f.flag+' '+f.name:'—';})()}
      </div>
    </div>

    ${board.map((row,rank)=>`
      <div class="podium-row" style="${rank===0?'border-color:var(--purple);background:#100c24':rank===1?'border-color:#3d3d55':''}">
        <div style="font-size:24px;width:32px;text-align:center">${medals[rank]||rank+1}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px">${row.name||`P${row.idx+1}`}</div>
          <div class="mono" style="font-size:10px;color:#555;margin-top:3px">
            Captain: ${(()=>{const f=figById(S.captains[row.idx]);return f?f.flag+' '+f.name:'—';})()}
          </div>
          <div class="mono" style="font-size:9px;color:#444;margin-top:3px;line-height:1.8">
            ${Object.entries(sc[row.idx].byFig).map(([fid,pts])=>{
              const f=figById(+fid);
              return f?`${f.flag} ${ptsStr(pts)}`:'';
            }).filter(Boolean).join(' · ')}
          </div>
        </div>
        <div class="score-pill" style="font-size:24px;color:${ptsColor(row.score)};flex-shrink:0">${ptsStr(row.score)}</div>
      </div>
    `).join('')}

    <div style="margin-top:48px;margin-bottom:18px">
      <div class="mono" style="font-size:9px;letter-spacing:3px;color:var(--purple);margin-bottom:6px">PLAYTEST DEBRIEF</div>
      <p style="font-size:13px;color:#555;margin-bottom:20px;line-height:1.8">
        Take 10 minutes as a group. Answer these out loud and write down what felt wrong. This is the most valuable thing you can do right now.
      </p>
      ${DEBRIEF_QUESTIONS.map((q,i)=>`<div class="debrief">${i+1}. ${q}</div>`).join('')}
    </div>

    <div style="text-align:center;margin-top:36px">
      <button class="btn btn-ghost" id="playAgain" style="font-size:11px;padding:12px 28px">← Play again with different squads</button>
    </div>

    <div class="mono" style="font-size:9px;color:#2a2a45;text-align:center;margin-top:28px;line-height:2.5;letter-spacing:.5px">
      POLITIPLAY · MVP PLAYTEST · BUILD THE REAL THING AT POLITIPLAY.NET
    </div>
  </div>`;
}

// ─── BIND ───────────────────────────────────────────────────────
function bindAll(){
  document.querySelectorAll('[data-setn]').forEach(el=>{
    el.onclick = ()=>{ S.numP=+el.dataset.setn; render(); };
  });
  document.querySelectorAll('[data-namei]').forEach(el=>{
    el.oninput = ()=>{ S.names[+el.dataset.namei]=el.value; };
  });
  const startBtn = document.getElementById('startBtn');
  if(startBtn) startBtn.onclick = ()=>{
    S.names = S.names.slice(0,S.numP).map((n,i)=>n.trim()||`Player ${i+1}`).concat(S.names.slice(S.numP));
    S.squads = Array(S.numP).fill(0).map(()=>[]);
    S.captains = Array(S.numP).fill(null);
    S.draftOrder = snakeOrder(S.numP, SQUAD_SIZE);
    S.pickIdx = 0; S.revDay = -1; S.posFilter = "All";
    S.phase = "draft"; render();
  };
  document.querySelectorAll('[data-filt]').forEach(el=>{
    el.onclick = ()=>{ S.posFilter=el.dataset.filt; render(); };
  });
  document.querySelectorAll('[data-pickfig]').forEach(el=>{
    el.onclick = ()=>{
      const fid=+el.dataset.pickfig, curP=S.draftOrder[S.pickIdx];
      S.squads[curP].push(fid); S.pickIdx++;
      if(S.pickIdx>=S.draftOrder.length){ S.capStep=0; S.phase="captain"; }
      render();
    };
  });
  document.querySelectorAll('[data-setcap]').forEach(el=>{
    el.onclick = ()=>{
      S.captains[S.capStep]=+el.dataset.setcap; S.capStep++;
      if(S.capStep>=S.numP){ S.phase="week"; S.revDay=-1; }
      render();
    };
  });
  const rev = document.getElementById('revealBtn');
  if(rev) rev.onclick = ()=>{ S.revDay=Math.min(S.revDay+1,4); render(); };
  const toRes = document.getElementById('toResults');
  if(toRes) toRes.onclick = ()=>{ S.phase="results"; render(); };
  const again = document.getElementById('playAgain');
  if(again) again.onclick = ()=>{ S.phase="setup"; render(); };
}

render();
</script>
</body>
</html>
